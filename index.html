<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FK Müzik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #0e1310;
            --bg-sidebar: #131a16;
            --bg-panel: #1a241e;
            --bg-hover: #243229;
            --accent: #1DB954;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --player-h: 90px;
            --sidebar-w: 260px;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-base); color: var(--text-main);
            font-family: 'Inter', sans-serif; overflow: hidden; position: fixed;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Layout */
        .app-container { display: flex; height: calc(100% - var(--player-h)); }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-w); background: var(--bg-sidebar); height: 100%;
            display: flex; flex-direction: column; transition: transform 0.3s ease;
            z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .brand { padding: 20px; font-size: 24px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; justify-content: space-between;}
        .close-sidebar { display: none; background: none; border: none; color: var(--text-main); font-size: 20px;}
        
        .nav-list { list-style: none; padding: 0 10px; margin: 0; overflow-y: auto; flex: 1; }
        .nav-item {
            padding: 12px 15px; margin-bottom: 5px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; color: var(--text-muted); font-weight: 500; transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: var(--bg-hover); color: var(--text-main); }
        .nav-item.active { color: var(--accent); }
        .nav-item i { width: 20px; text-align: center; font-size: 18px; }

        .section-title { padding: 15px 25px 5px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;}
        .add-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0;}
        .add-btn:hover { color: var(--text-main); }

        .storage-info { padding: 20px; font-size: 12px; color: var(--text-muted); border-top: 1px solid #2a3b31; }
        .storage-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .storage-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .backup-btns { display: flex; gap: 10px; padding: 10px 20px 20px;}
        .btn-small { flex:1; padding: 8px; border-radius: 4px; border: none; background: var(--bg-panel); color: var(--text-main); cursor: pointer; font-size: 12px;}
        .btn-small:hover { background: var(--bg-hover); }

        /* Main Content */
        .main-content {
            flex: 1; background: linear-gradient(180deg, #18281d 0%, var(--bg-base) 100%);
            display: flex; flex-direction: column; height: 100%; position: relative;
        }
        .header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(14, 19, 16, 0.8); backdrop-filter: blur(10px); z-index: 10;
        }
        .menu-toggle { display: none; background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; }
        
        .upload-group { display: flex; gap: 10px; }
        .btn-upload {
            background: var(--bg-panel); border: 1px solid #2a3b31; color: var(--text-main);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .btn-upload:hover { background: var(--bg-hover); border-color: var(--text-muted); }
        .btn-upload i { color: var(--accent); }

        .view-title { padding: 20px; font-size: 32px; font-weight: 700; margin: 0; }

        .song-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .song-row {
            display: flex; align-items: center; padding: 10px; border-radius: 6px; cursor: pointer; gap: 15px; position: relative;
        }
        .song-row:hover { background: rgba(255,255,255,0.1); }
        .song-row.playing { color: var(--accent); }
        .song-idx { width: 30px; text-align: center; color: var(--text-muted); }
        .song-row:hover .song-idx { display: none; }
        .song-play-btn { display: none; width: 30px; text-align: center; color: var(--text-main); }
        .song-row:hover .song-play-btn { display: block; }
        .song-row.playing .song-idx { display: none; }
        .song-row.playing .song-play-btn { display: block; color: var(--accent); }
        
        .song-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .song-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
        
        .song-actions { display: flex; align-items: center; gap: 15px; opacity: 0; transition: opacity 0.2s;}
        .song-row:hover .song-actions, .song-actions.active { opacity: 1; }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 5px; }
        .btn-icon:hover { color: var(--text-main); transform: scale(1.1); }
        .btn-icon.active-heart { color: var(--accent); opacity: 1; }

        /* Dropdown Menu */
        .dropdown { position: absolute; right: 10px; top: 40px; background: #282828; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 50; display: none; min-width: 150px; padding: 5px 0;}
        .dropdown.show { display: block; }
        .dropdown-item { padding: 10px 15px; color: var(--text-main); cursor: pointer; font-size: 14px; display: flex; gap:10px; align-items: center;}
        .dropdown-item:hover { background: #3e3e3e; }
        .dropdown-item i { width: 16px;}

        /* Reorder Buttons */
        .reorder-btns { display: flex; flex-direction: column; gap: 5px;}
        .reorder-btns button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px;}
        .reorder-btns button:hover { color: var(--text-main);}

        /* Empty State */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; padding: 20px;}
        .empty-state i { font-size: 64px; margin-bottom: 20px; color: #2a3b31; }

        /* Bottom Player */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--player-h);
            background: #181818; border-top: 1px solid #282828; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 200; justify-content: space-between;
        }
        
        .now-playing { display: flex; align-items: center; width: 30%; min-width: 150px; overflow: hidden; gap: 15px;}
        .artwork-placeholder { width: 56px; height: 56px; background: #282828; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 24px; flex-shrink: 0;}
        .np-info { display: flex; flex-direction: column; overflow: hidden; flex: 1;}
        .np-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main);}
        .np-artist { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .player-controls { display: flex; flex-direction: column; align-items: center; width: 40%; max-width: 600px;}
        .control-buttons { display: flex; align-items: center; gap: 20px; margin-bottom: 8px;}
        .ctrl-btn { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; transition: 0.2s;}
        .ctrl-btn:hover { color: var(--text-main); }
        .ctrl-btn.active { color: var(--accent); position: relative;}
        .ctrl-btn.active::after { content:''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--accent); border-radius: 50%;}
        .play-pause-btn { width: 32px; height: 32px; background: var(--text-main); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;}
        .play-pause-btn:hover { transform: scale(1.05); }

        .progress-container { display: flex; align-items: center; width: 100%; gap: 10px; font-size: 11px; color: var(--text-muted);}
        .progress-bar { flex: 1; height: 4px; background: #4d4d4d; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--text-main); border-radius: 2px; width: 0%; }
        .progress-bar:hover .progress-fill { background: var(--accent); }

        .extra-controls { display: flex; align-items: center; justify-content: flex-end; width: 30%; gap: 10px; position: relative;}
        .volume-container { display: flex; align-items: center; gap: 8px; width: 100px;}
        .vol-slider { -webkit-appearance: none; width: 100%; height: 4px; background: #4d4d4d; border-radius: 2px; outline: none;}
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--text-main); border-radius: 50%; cursor: pointer; display: none;}
        .volume-container:hover .vol-slider::-webkit-slider-thumb { display: block; }
        
        .sleep-timer-menu { position: absolute; bottom: 40px; right: 0; background: #282828; padding: 10px; border-radius: 6px; display: none; flex-direction: column; gap: 5px; z-index: 300; box-shadow: 0 -4px 10px rgba(0,0,0,0.5);}
        .sleep-timer-menu.show { display: flex; }
        .st-btn { background: none; border: none; color: var(--text-main); padding: 5px 10px; text-align: left; cursor: pointer; border-radius: 4px;}
        .st-btn:hover { background: #3e3e3e; }
        .st-btn.active { color: var(--accent); }

        /* Modals/Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { background: var(--bg-panel); padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; }
        .modal h3 { margin-top: 0; margin-bottom: 20px;}
        .modal input { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; margin-bottom: 20px; box-sizing: border-box; outline: none;}
        .modal input:focus { border-color: var(--accent); }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px;}
        .modal-btns button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-cancel { background: transparent; color: var(--text-main); }
        .btn-save { background: var(--accent); color: #000; }

        .loader { border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle, .close-sidebar { display: block; }
            .now-playing { width: auto; flex: 1;}
            .player-controls { position: absolute; bottom: 100px; left: 0; width: 100%; background: #181818; padding: 10px 0; border-top: 1px solid #282828;}
            .app-container { height: calc(100% - var(--player-h) - 70px); }
            .extra-controls { display: none; } /* Hide volume on mobile, rely on hardware */
            .mobile-sleep { display: block; margin-left: auto; background: none; border: none; color: var(--text-muted); font-size: 18px;}
        }
        @media (min-width: 769px) { .mobile-sleep { display: none; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            FK Müzik
            <button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        
        <ul class="nav-list">
            <li class="nav-item active" onclick="switchView('all')"><i class="fas fa-music"></i> Tüm Şarkılar</li>
            <li class="nav-item" onclick="switchView('favorites')"><i class="fas fa-heart"></i> Favoriler</li>
            <li class="nav-item" onclick="switchView('queue')"><i class="fas fa-list-ol"></i> Sıradakiler</li>
            
            <div class="section-title">
                Çalma Listeleri
                <button class="add-btn" onclick="openPlaylistModal()"><i class="fas fa-plus"></i></button>
            </div>
            <div id="playlist-nav"></div>
        </ul>

        <div class="storage-info">
            Depolama Alanı: <span id="storage-text">Hesaplanıyor...</span>
            <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
        </div>
        <div class="backup-btns">
            <button class="btn-small" onclick="exportData()"><i class="fas fa-download"></i> Dışa Aktar</button>
            <button class="btn-small" onclick="document.getElementById('importInput').click()"><i class="fas fa-upload"></i> İçe Aktar</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="upload-group">
                <label class="btn-upload">
                    <i class="fas fa-file-audio"></i> Dosya Seç
                    <input type="file" id="fileInput" multiple accept="audio/*" style="display:none;" onchange="handleFiles(this.files)">
                </label>
                <label class="btn-upload">
                    <i class="fas fa-folder-open"></i> Klasör
                    <input type="file" id="folderInput" webkitdirectory directory multiple accept="audio/*" style="display:none;" onchange="handleFiles(this.files)">
                </label>
                <input type="file" id="importInput" accept=".json" style="display:none;" onchange="importData(this.files[0])">
            </div>
        </header>

        <h1 class="view-title" id="view-title">Tüm Şarkılar</h1>
        <div class="song-list" id="song-list">
            <!-- Songs injected here -->
        </div>
    </main>
</div>

<!-- Player Bar -->
<div class="player-bar">
    <div class="now-playing">
        <div class="artwork-placeholder"><i class="fas fa-music"></i></div>
        <div class="np-info">
            <span class="np-title" id="np-title">Şarkı seçilmedi</span>
            <span class="np-artist" id="np-artist">-</span>
        </div>
        <button class="mobile-sleep" onclick="toggleSleepMenu()"><i class="fas fa-moon"></i></button>
    </div>

    <div class="player-controls">
        <div class="control-buttons">
            <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
            <button class="ctrl-btn" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
            <button class="play-pause-btn" id="btn-play" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
            <button class="ctrl-btn" id="btn-repeat" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
        </div>
        <div class="progress-container">
            <span id="time-current">0:00</span>
            <div class="progress-bar" id="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span id="time-total">0:00</span>
        </div>
    </div>

    <div class="extra-controls">
        <button class="ctrl-btn" id="btn-sleep" onclick="toggleSleepMenu()"><i class="fas fa-moon"></i></button>
        <div class="sleep-timer-menu" id="sleep-menu">
            <div style="font-size: 11px; color:#aaa; padding: 5px; border-bottom: 1px solid #444; margin-bottom:5px;">Uyku Zamanlayıcı</div>
            <button class="st-btn" onclick="setSleepTimer(0)">Kapalı</button>
            <button class="st-btn" onclick="setSleepTimer(15)">15 Dakika</button>
            <button class="st-btn" onclick="setSleepTimer(30)">30 Dakika</button>
            <button class="st-btn" onclick="setSleepTimer(45)">45 Dakika</button>
            <button class="st-btn" onclick="setSleepTimer(60)">60 Dakika</button>
        </div>
        <div class="volume-container">
            <button class="ctrl-btn" id="btn-mute" onclick="toggleMute()"><i class="fas fa-volume-up"></i></button>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="1" oninput="changeVolume(this.value)">
        </div>
    </div>
</div>

<!-- Modals -->
<div class="overlay" id="loading-overlay">
    <div style="text-align: center;">
        <div class="loader"></div>
        <div id="loading-text" style="font-weight: bold;">İşleniyor...</div>
    </div>
</div>

<div class="overlay" id="playlist-modal">
    <div class="modal">
        <h3>Yeni Çalma Listesi</h3>
        <input type="text" id="playlist-name-input" placeholder="Liste Adı">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('playlist-modal')">İptal</button>
            <button class="btn-save" onclick="createPlaylist()">Oluştur</button>
        </div>
    </div>
</div>

<div class="overlay" id="add-to-playlist-modal">
    <div class="modal">
        <h3>Listeye Ekle</h3>
        <div id="add-to-playlist-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('add-to-playlist-modal')">İptal</button>
        </div>
    </div>
</div>

<script>
/**
 * DB Setup & State Management
 */
const DB_NAME = 'FKMuzikDB';
const DB_VERSION = 1;
let db;

const state = {
    songs: [], // metadata only
    playlists: [],
    queue: [], // explicit user queue
    currentContext: [], // currently playing list ids
    originalContext: [], // for un-shuffling
    currentSongId: null,
    isPlaying: false,
    isShuffle: false,
    repeatMode: 0, // 0: off, 1: all, 2: one
    currentView: 'all', // 'all', 'favorites', 'queue', 'playlist-{id}'
    sleepTimerId: null,
    sleepEndTime: null
};

const audio = new Audio();
let currentObjectUrl = null;
let activeDropdown = null;

// Initialization
async function init() {
    await openDB();
    await loadStateFromDB();
    setupAudioListeners();
    setupMediaSession();
    renderSidebarPlaylists();
    switchView('all');
    updateStorageInfo();
    
    // Autoplay attempt if not empty
    if (state.songs.length > 0) {
        prepareSong(state.songs[0].id);
        // Browsers block autoplay, but we attempt it gracefully
        audio.play().catch(e => console.log("Autoplay blocked, waiting for user interaction."));
    }
}

/**
 * IndexedDB Operations
 */
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('songs')) {
                const songStore = db.createObjectStore('songs', { keyPath: 'id', autoIncrement: true });
                songStore.createIndex('addedAt', 'addedAt', { unique: false });
            }
            if (!db.objectStoreNames.contains('playlists')) {
                db.createObjectStore('playlists', { keyPath: 'id', autoIncrement: true });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(); };
        request.onerror = (e) => reject(e);
    });
}

async function loadStateFromDB() {
    state.songs = await getAllSongsMeta();
    state.songs.sort((a, b) => b.addedAt - a.addedAt); // Newest first
    state.playlists = await getAllPlaylists();
}

function getAllSongsMeta() {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['songs'], 'readonly');
        const store = transaction.objectStore('songs');
        const request = store.getAll();
        request.onsuccess = () => {
            // Exclude large blob for memory efficiency in state
            const metas = request.result.map(s => ({
                id: s.id, title: s.title, artist: s.artist, 
                addedAt: s.addedAt, isFavorite: s.isFavorite, size: s.file.size
            }));
            resolve(metas);
        };
        request.onerror = (e) => reject(e);
    });
}

function getSongBlob(id) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['songs'], 'readonly');
        const request = transaction.objectStore('songs').get(id);
        request.onsuccess = () => resolve(request.result);
        request.onerror = (e) => reject(e);
    });
}

function saveSong(songObj) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['songs'], 'readwrite');
        const request = transaction.objectStore('songs').put(songObj);
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e);
    });
}

function removeSongFromDB(id) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['songs'], 'readwrite');
        const request = transaction.objectStore('songs').delete(id);
        request.onsuccess = () => resolve();
        request.onerror = (e) => reject(e);
    });
}

function getAllPlaylists() {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['playlists'], 'readonly');
        const request = transaction.objectStore('playlists').getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = (e) => reject(e);
    });
}

function savePlaylist(pl) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['playlists'], 'readwrite');
        const request = transaction.objectStore('playlists').put(pl);
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e);
    });
}

function removePlaylistFromDB(id) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['playlists'], 'readwrite');
        const request = transaction.objectStore('playlists').delete(id);
        request.onsuccess = () => resolve();
        request.onerror = (e) => reject(e);
    });
}

/**
 * File Handling
 */
async function handleFiles(files) {
    if(!files || files.length === 0) return;
    showLoading("Şarkılar Yükleniyor...");
    
    for(let i=0; i<files.length; i++) {
        const file = files[i];
        if(!file.type.startsWith('audio/')) continue;
        
        let title = file.name.replace(/\.[^/.]+$/, "");
        let artist = "Bilinmeyen Sanatçı";
        
        // Simple name split attempt "Artist - Title"
        if(title.includes(" - ")) {
            const parts = title.split(" - ");
            artist = parts[0].trim();
            title = parts.slice(1).join(" - ").trim();
        }

        const newSong = {
            title: title,
            artist: artist,
            file: file,
            addedAt: Date.now(),
            isFavorite: false
        };
        
        await saveSong(newSong);
    }
    
    await loadStateFromDB();
    if(state.currentView === 'all') renderView();
    updateStorageInfo();
    hideLoading();
}

/**
 * Audio Player Logic
 */
function setupAudioListeners() {
    audio.addEventListener('timeupdate', updateProgressUI);
    audio.addEventListener('ended', handleSongEnd);
    audio.addEventListener('play', () => { state.isPlaying = true; updatePlayerUI(); });
    audio.addEventListener('pause', () => { state.isPlaying = false; updatePlayerUI(); });
}

async function prepareSong(id, forcePlay = false) {
    const fullSong = await getSongBlob(id);
    if(!fullSong) return;

    if(currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
    }
    
    currentObjectUrl = URL.createObjectURL(fullSong.file);
    audio.src = currentObjectUrl;
    state.currentSongId = id;
    
    document.getElementById('np-title').textContent = fullSong.title;
    document.getElementById('np-artist').textContent = fullSong.artist;
    
    updateMediaSession(fullSong);
    renderView(); // to update playing state highlights
    
    if(forcePlay) {
        audio.play();
    }
}

function togglePlay() {
    if(!state.currentSongId && state.songs.length > 0) {
        playContext(state.songs.map(s=>s.id), 0);
        return;
    }
    if(state.isPlaying) audio.pause();
    else audio.play();
}

function nextSong() {
    if(state.repeatMode === 2) {
        audio.currentTime = 0; audio.play(); return;
    }
    
    if(state.queue.length > 0) {
        const nextId = state.queue.shift();
        prepareSong(nextId, true);
        if(state.currentView === 'queue') renderView();
        return;
    }

    if(state.currentContext.length === 0) return;
    
    let currentIndex = state.currentContext.indexOf(state.currentSongId);
    let nextIndex = currentIndex + 1;

    if(nextIndex >= state.currentContext.length) {
        if(state.repeatMode === 1) nextIndex = 0;
        else return; // Stop at end
    }
    
    prepareSong(state.currentContext[nextIndex], true);
}

function prevSong() {
    if(audio.currentTime > 3) {
        audio.currentTime = 0; return;
    }
    
    if(state.currentContext.length === 0) return;
    
    let currentIndex = state.currentContext.indexOf(state.currentSongId);
    let prevIndex = currentIndex - 1;

    if(prevIndex < 0) {
        if(state.repeatMode === 1) prevIndex = state.currentContext.length - 1;
        else prevIndex = 0; 
    }
    
    prepareSong(state.currentContext[prevIndex], true);
}

function handleSongEnd() {
    nextSong();
}

function playContext(idArray, startIndex = 0) {
    state.originalContext = [...idArray];
    if(state.isShuffle) {
        const toShuffle = [...idArray];
        const first = toShuffle.splice(startIndex, 1)[0];
        for (let i = toShuffle.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [toShuffle[i], toShuffle[j]] = [toShuffle[j], toShuffle[i]];
        }
        state.currentContext = [first, ...toShuffle];
        prepareSong(first, true);
    } else {
        state.currentContext = [...idArray];
        prepareSong(state.currentContext[startIndex], true);
    }
}

function playSingle(id) {
    // If playing from a list, setup context
    let contextIds = [];
    if(state.currentView === 'all') contextIds = state.songs.map(s=>s.id);
    else if(state.currentView === 'favorites') contextIds = state.songs.filter(s=>s.isFavorite).map(s=>s.id);
    else if(state.currentView.startsWith('playlist-')) {
        const plId = parseInt(state.currentView.split('-')[1]);
        const pl = state.playlists.find(p=>p.id === plId);
        if(pl) contextIds = pl.songIds;
    }
    
    if(contextIds.includes(id)) {
        playContext(contextIds, contextIds.indexOf(id));
    } else {
        state.currentContext = [id];
        prepareSong(id, true);
    }
}

function toggleShuffle() {
    state.isShuffle = !state.isShuffle;
    const btn = document.getElementById('btn-shuffle');
    btn.classList.toggle('active', state.isShuffle);
    
    if(state.currentContext.length > 0 && state.currentSongId) {
        if(state.isShuffle) {
            const currentId = state.currentSongId;
            const others = state.currentContext.filter(id => id !== currentId);
            for (let i = others.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [others[i], others[j]] = [others[j], others[i]];
            }
            state.currentContext = [currentId, ...others];
        } else {
            // Restore original order
            state.currentContext = [...state.originalContext];
        }
    }
}

function toggleRepeat() {
    state.repeatMode = (state.repeatMode + 1) % 3;
    const btn = document.getElementById('btn-repeat');
    btn.classList.remove('active');
    btn.innerHTML = '<i class="fas fa-redo"></i>';
    if(state.repeatMode === 1) {
        btn.classList.add('active');
    } else if (state.repeatMode === 2) {
        btn.classList.add('active');
        btn.innerHTML = '<i class="fas fa-redo" style="position:relative;"><span style="position:absolute;font-size:8px;top:50%;left:50%;transform:translate(-50%,-50%);font-family:sans-serif;font-weight:bold;">1</span></i>';
    }
}

/**
 * UI & Interactions
 */
function updatePlayerUI() {
    const playBtn = document.getElementById('btn-play');
    playBtn.innerHTML = state.isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
}

function updateProgressUI() {
    if(!audio.duration) return;
    const percent = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress-fill').style.width = `${percent}%`;
    document.getElementById('time-current').textContent = formatTime(audio.currentTime);
    document.getElementById('time-total').textContent = formatTime(audio.duration);
}

function seek(e) {
    const bar = document.getElementById('progress-bar');
    const rect = bar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    if(audio.duration) audio.currentTime = percent * audio.duration;
}

function changeVolume(val) {
    audio.volume = val;
    audio.muted = false;
    updateMuteIcon();
}

function toggleMute() {
    audio.muted = !audio.muted;
    updateMuteIcon();
}

function updateMuteIcon() {
    const icon = document.querySelector('#btn-mute i');
    if(audio.muted || audio.volume === 0) icon.className = 'fas fa-volume-mute';
    else if(audio.volume < 0.5) icon.className = 'fas fa-volume-down';
    else icon.className = 'fas fa-volume-up';
}

function formatTime(secs) {
    if(isNaN(secs)) return "0:00";
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

/**
 * Rendering Views
 */
function switchView(view) {
    state.currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    
    let activeElem;
    if(view === 'all') activeElem = document.querySelector('.nav-item:nth-child(1)');
    else if(view === 'favorites') activeElem = document.querySelector('.nav-item:nth-child(2)');
    else if(view === 'queue') activeElem = document.querySelector('.nav-item:nth-child(3)');
    else if(view.startsWith('playlist-')) {
        const id = view.split('-')[1];
        activeElem = document.getElementById(`nav-pl-${id}`);
    }
    if(activeElem) activeElem.classList.add('active');
    
    if(window.innerWidth <= 768) toggleSidebar(); // Close on mobile

    renderView();
}

function renderView() {
    const container = document.getElementById('song-list');
    const titleEl = document.getElementById('view-title');
    container.innerHTML = '';
    
    let displaySongs = [];
    let isQueue = false;
    let playlistId = null;

    if(state.currentView === 'all') {
        titleEl.textContent = 'Tüm Şarkılar';
        displaySongs = state.songs;
    } else if(state.currentView === 'favorites') {
        titleEl.textContent = 'Favoriler';
        displaySongs = state.songs.filter(s => s.isFavorite);
    } else if(state.currentView === 'queue') {
        titleEl.textContent = 'Sıradakiler';
        displaySongs = state.queue.map(id => state.songs.find(s=>s.id === id)).filter(Boolean);
        isQueue = true;
    } else if(state.currentView.startsWith('playlist-')) {
        playlistId = parseInt(state.currentView.split('-')[1]);
        const pl = state.playlists.find(p => p.id === playlistId);
        if(pl) {
            titleEl.innerHTML = `${pl.name} <button class="btn-icon" onclick="deletePlaylist(${pl.id})" title="Listeyi Sil"><i class="fas fa-trash"></i></button>`;
            displaySongs = pl.songIds.map(id => state.songs.find(s=>s.id === id)).filter(Boolean);
        }
    }

    if(displaySongs.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-music"></i><p>Burada henüz bir şey yok.</p></div>`;
        return;
    }

    displaySongs.forEach((song, index) => {
        const isPlaying = song.id === state.currentSongId;
        const row = document.createElement('div');
        row.className = `song-row ${isPlaying ? 'playing' : ''}`;
        
        let prefixHtml = `<div class="song-idx">${index + 1}</div>
                          <div class="song-play-btn" onclick="playSingle(${song.id})"><i class="fas ${isPlaying && state.isPlaying ? 'fa-pause' : 'fa-play'}"></i></div>`;
        
        let reorderHtml = '';
        if(isQueue || playlistId !== null) {
            reorderHtml = `
                <div class="reorder-btns">
                    <button onclick="moveItem(${index}, -1, ${isQueue}, ${playlistId})"><i class="fas fa-chevron-up"></i></button>
                    <button onclick="moveItem(${index}, 1, ${isQueue}, ${playlistId})"><i class="fas fa-chevron-down"></i></button>
                </div>
            `;
        }

        row.innerHTML = `
            ${prefixHtml}
            <div class="song-info" onclick="playSingle(${song.id})">
                <div class="song-title">${song.title}</div>
                <div class="song-artist">${song.artist}</div>
            </div>
            ${reorderHtml}
            <div class="song-actions ${activeDropdown === song.id ? 'active' : ''}">
                <button class="btn-icon ${song.isFavorite ? 'active-heart' : ''}" onclick="toggleFav(${song.id}, event)"><i class="fas fa-heart"></i></button>
                <div style="position:relative;">
                    <button class="btn-icon" onclick="toggleMenu(${song.id}, event)"><i class="fas fa-ellipsis-h"></i></button>
                    <div class="dropdown ${activeDropdown === song.id ? 'show' : ''}" id="menu-${song.id}">
                        <div class="dropdown-item" onclick="addToQueue(${song.id}, event)"><i class="fas fa-list"></i> Sıraya Ekle</div>
                        <div class="dropdown-item" onclick="openAddToPlaylistModal(${song.id}, event)"><i class="fas fa-plus-circle"></i> Listeye Ekle</div>
                        ${isQueue ? `<div class="dropdown-item" onclick="removeFromQueue(${index}, event)"><i class="fas fa-times"></i> Sıradan Kaldır</div>` : ''}
                        ${playlistId !== null ? `<div class="dropdown-item" onclick="removeFromPlaylist(${playlistId}, ${index}, event)"><i class="fas fa-minus-circle"></i> Listeden Çıkar</div>` : ''}
                        <div class="dropdown-item" style="color:#e74c3c;" onclick="deleteSongFully(${song.id}, event)"><i class="fas fa-trash"></i> Kalıcı Olarak Sil</div>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(row);
    });
}

function renderSidebarPlaylists() {
    const nav = document.getElementById('playlist-nav');
    nav.innerHTML = '';
    state.playlists.forEach(pl => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.id = `nav-pl-${pl.id}`;
        li.onclick = () => switchView(`playlist-${pl.id}`);
        li.innerHTML = `<i class="fas fa-list"></i> <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${pl.name}</span>`;
        nav.appendChild(li);
    });
}

/**
 * Item Actions
 */
async function toggleFav(id, e) {
    e.stopPropagation();
    const song = await getSongBlob(id);
    song.isFavorite = !song.isFavorite;
    await saveSong(song);
    
    const metaIndex = state.songs.findIndex(s=>s.id===id);
    if(metaIndex > -1) state.songs[metaIndex].isFavorite = song.isFavorite;
    
    if(state.currentView === 'favorites' && !song.isFavorite) {
        renderView();
    } else {
        // Toggle icon immediately
        const icon = e.currentTarget;
        icon.classList.toggle('active-heart', song.isFavorite);
    }
}

function toggleMenu(id, e) {
    e.stopPropagation();
    if(activeDropdown === id) activeDropdown = null;
    else activeDropdown = id;
    renderView(); // Re-render to show/hide menus
}
// Close dropdowns on body click
document.body.addEventListener('click', () => {
    if(activeDropdown !== null) {
        activeDropdown = null;
        renderView();
    }
    const sleepMenu = document.getElementById('sleep-menu');
    if(sleepMenu.classList.contains('show') && !e.target.closest('.extra-controls')) {
        sleepMenu.classList.remove('show');
    }
});

function addToQueue(id, e) {
    e.stopPropagation();
    state.queue.push(id);
    activeDropdown = null;
    renderView();
    showToast("Sıraya eklendi");
}

function removeFromQueue(index, e) {
    e.stopPropagation();
    state.queue.splice(index, 1);
    activeDropdown = null;
    renderView();
}

async function deleteSongFully(id, e) {
    e.stopPropagation();
    if(!confirm("Bu şarkıyı kalıcı olarak silmek istediğinize emin misiniz?")) return;
    
    // Remove from DB
    await removeSongFromDB(id);
    
    // Remove from State
    state.songs = state.songs.filter(s => s.id !== id);
    state.queue = state.queue.filter(qId => qId !== id);
    state.currentContext = state.currentContext.filter(cId => cId !== id);
    state.originalContext = state.originalContext.filter(cId => cId !== id);
    
    // Remove from Playlists
    let plUpdated = false;
    for(let pl of state.playlists) {
        const idx = pl.songIds.indexOf(id);
        if(idx > -1) {
            pl.songIds.splice(idx, 1);
            await savePlaylist(pl);
            plUpdated = true;
        }
    }
    
    if(state.currentSongId === id) {
        audio.pause();
        state.currentSongId = null;
        document.getElementById('np-title').textContent = "Şarkı seçilmedi";
        document.getElementById('np-artist').textContent = "-";
        nextSong();
    }
    
    activeDropdown = null;
    renderView();
    updateStorageInfo();
}

 * Playlist Management
 */
function openPlaylistModal() {
    document.getElementById('playlist-modal').style.display = 'flex';
    document.getElementById('playlist-name-input').focus();
}

async function createPlaylist() {
    const input = document.getElementById('playlist-name-input');
    const name = input.value.trim();
    if(!name) return;
    
    const pl = { name: name, songIds: [] };
    const newId = await savePlaylist(pl);
    pl.id = newId;
    state.playlists.push(pl);
    
    input.value = '';
    closeModal('playlist-modal');
    renderSidebarPlaylists();
}

async function deletePlaylist(id) {
    if(!confirm("Çalma listesini silmek istiyor musunuz?")) return;
    await removePlaylistFromDB(id);
    state.playlists = state.playlists.filter(p => p.id !== id);
    if(state.currentView === `playlist-${id}`) switchView('all');
    renderSidebarPlaylists();
}

let pendingSongForPlaylist = null;
function openAddToPlaylistModal(songId, e) {
    e.stopPropagation();
    pendingSongForPlaylist = songId;
    activeDropdown = null;
    const list = document.getElementById('add-to-playlist-list');
    list.innerHTML = '';
    
    if(state.playlists.length === 0) {
        list.innerHTML = '<div style="color:#aaa; font-size:14px; text-align:center; padding:10px;">Önce çalma listesi oluşturun.</div>';
    } else {
        state.playlists.forEach(pl => {
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.innerHTML = `<i class="fas fa-list"></i> ${pl.name}`;
            div.onclick = () => addPendingToPlaylist(pl.id);
            list.appendChild(div);
        });
    }
    document.getElementById('add-to-playlist-modal').style.display = 'flex';
    renderView(); // close open dropdown
}

async function addPendingToPlaylist(plId) {
    if(!pendingSongForPlaylist) return;
    const pl = state.playlists.find(p => p.id === plId);
    if(pl && !pl.songIds.includes(pendingSongForPlaylist)) {
        pl.songIds.push(pendingSongForPlaylist);
        await savePlaylist(pl);
        showToast("Listeye eklendi");
    }
    closeModal('add-to-playlist-modal');
}

async function removeFromPlaylist(plId, index, e) {
    e.stopPropagation();
    const pl = state.playlists.find(p => p.id === plId);
    if(pl) {
        pl.songIds.splice(index, 1);
        await savePlaylist(pl);
        renderView();
    }
}

async function moveItem(index, dir, isQueue, playlistId) {
    // stop propagation handled inline mostly, but good practice if attached as listener
    if(window.event) window.event.stopPropagation();
    activeDropdown = null;

    let arr;
    if(isQueue) arr = state.queue;
    else if(playlistId !== null) arr = state.playlists.find(p=>p.id===playlistId).songIds;
    else return;

    if(index + dir < 0 || index + dir >= arr.length) return;
    
    // Swap
    [arr[index], arr[index+dir]] = [arr[index+dir], arr[index]];
    
    if(playlistId !== null) {
        const pl = state.playlists.find(p=>p.id===playlistId);
        await savePlaylist(pl);
    }
    renderView();
}

/**
 * Backup and Restore (JSON + Base64 Blobs)
 * Warning: Base64 encoding large audio files can be memory intensive.
 */
function blobToBase64(blob) {
    return new Promise((resolve, _) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
    });
}
function base64ToBlob(base64) {
    const parts = base64.split(';base64,');
    const contentType = parts[0].split(':')[1];
    const raw = window.atob(parts[1]);
    const rawLength = raw.length;
    const uInt8Array = new Uint8Array(rawLength);
    for (let i = 0; i < rawLength; ++i) {
        uInt8Array[i] = raw.charCodeAt(i);
    }
    return new Blob([uInt8Array], { type: contentType });
}

async function exportData() {
    if(state.songs.length === 0) {
        alert("Dışa aktarılacak şarkı yok."); return;
    }
    showLoading("Yedek Hazırlanıyor... (Bu işlem uzun sürebilir)");
    
    try {
        const exportSongs = [];
        // Fetch all full blobs
        const transaction = db.transaction(['songs'], 'readonly');
        const req = transaction.objectStore('songs').getAll();
        
        req.onsuccess = async () => {
            const allDbSongs = req.result;
            for(let s of allDbSongs) {
                const b64 = await blobToBase64(s.file);
                exportSongs.push({
                    id: s.id, title: s.title, artist: s.artist, 
                    addedAt: s.addedAt, isFavorite: s.isFavorite, 
                    fileData: b64, fileName: s.file.name
                });
            }
            
            const backup = {
                version: 1,
                songs: exportSongs,
                playlists: state.playlists
            };
            
            const jsonStr = JSON.stringify(backup);
            const blob = new Blob([jsonStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `FKMuzik_Yedek_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            hideLoading();
        };
        req.onerror = () => { hideLoading(); alert("Dışa aktarma hatası."); };
        
    } catch(e) {
        console.error(e);
        hideLoading();
        alert("Yedekleme sırasında bellek sınırı aşıldı. Lütfen daha az şarkı ile deneyin.");
    }
}

async function importData(file) {
    if(!file) return;
    if(!confirm("İçe aktarma işlemi mevcut kitaplığınızı silip üzerine yazacaktır. Devam edilsin mi?")) return;
    
    showLoading("Yedek Yükleniyor...");
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if(!data.songs || !data.playlists) throw new Error("Geçersiz format");
            
            // Clear current DB
            const tx = db.transaction(['songs', 'playlists'], 'readwrite');
            tx.objectStore('songs').clear();
            tx.objectStore('playlists').clear();
            
            tx.oncomplete = async () => {
                // Insert new data
                for(let s of data.songs) {
                    const blob = base64ToBlob(s.fileData);
                    blob.name = s.fileName; // Try to retain name
                    await saveSong({
                        id: s.id, title: s.title, artist: s.artist,
                        addedAt: s.addedAt, isFavorite: s.isFavorite, file: blob
                    });
                }
                for(let pl of data.playlists) {
                    await savePlaylist(pl);
                }
                
                state.queue = [];
                state.currentContext = [];
                audio.pause();
                
                await loadStateFromDB();
                renderSidebarPlaylists();
                switchView('all');
                updateStorageInfo();
                hideLoading();
                alert("Yedek başarıyla yüklendi.");
            };
            
        } catch(err) {
            console.error(err);
            hideLoading();
            alert("İçe aktarma başarısız oldu. Dosya bozuk olabilir.");
        }
    };
    reader.readAsText(file);
}

// Start app
window.onload = init;

</script>
</body>
</html>
